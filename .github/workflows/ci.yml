name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_SUBDOMAIN }}
      ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
      ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm skills:validate
      - run: pnpm build
      - run: pnpm worker:types:check
      - name: Dry-run Worker bundle
        run: pnpm worker:dry-run
        env:
          BACKEND_AUTH_TOKEN: ci-dry-run-token
          TENANT_KEY: ci-dry-run-tenant
          WOO_SOLUTION_PEPTIDES_BASE_URL: https://solutionpeptides.net
          WOO_ATOMIK_LABZ_BASE_URL: https://atomiklabz.com
          CF_ACCESS_TEAM_DOMAIN: resolve.cloudflareaccess.com
          CF_ACCESS_AUD: ci-access-audience
          PHONE_CACHE_HMAC_KEY: ci-phone-cache-hmac-key
      - name: Validate Zendesk package
        if: env.ZENDESK_SUBDOMAIN != '' && env.ZENDESK_EMAIL != '' && env.ZENDESK_API_TOKEN != ''
        run: pnpm zaf:validate
      - name: Package with ZCLI
        if: env.ZENDESK_SUBDOMAIN != '' && env.ZENDESK_EMAIL != '' && env.ZENDESK_API_TOKEN != ''
        run: pnpm zaf:package
      - name: Build release ZIP
        run: pnpm --filter @resolve/zendesk-app package:zip
