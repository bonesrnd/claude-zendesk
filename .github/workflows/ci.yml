name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_SUBDOMAIN }}
      ZENDESK_EMAIL: ${{ secrets.ZENDESK_EMAIL }}
      ZENDESK_API_TOKEN: ${{ secrets.ZENDESK_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm skills:validate
      - run: pnpm build
      - run: pnpm worker:types:check
      - name: Dry-run Worker bundle
        run: pnpm worker:dry-run
        env:
          BACKEND_AUTH_TOKEN: ci-dry-run-token
          TENANT_KEY: ci-dry-run-tenant
          WOO_BASE_URL: https://store.example
      - name: Validate Zendesk package
        if: env.ZENDESK_SUBDOMAIN != '' && env.ZENDESK_EMAIL != '' && env.ZENDESK_API_TOKEN != ''
        run: pnpm zaf:validate
